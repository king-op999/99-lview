<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRONX ULTRA - Telegram Views</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: #111;
            border-radius: 20px;
            border: 1px solid #222;
            padding: 30px;
        }
        .header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #bf00ff, #00c8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .badge {
            color: #888;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .input-group input, .input-group button {
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
        }
        .input-group input {
            flex: 1;
            min-width: 200px;
        }
        .input-group input:focus {
            border-color: #bf00ff;
            outline: none;
        }
        .input-group button {
            background: linear-gradient(90deg, #bf00ff, #6a00ff);
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .input-group button:hover {
            transform: scale(1.05);
        }
        .input-group button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-danger { background: #ff0044 !important; }
        .btn-success { background: #00cc66 !important; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .status-bar .status-text { font-size: 16px; }
        .status-bar .status-text .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .dot.green { background: #00cc66; }
        .dot.red { background: #ff0044; }
        .dot.yellow { background: #ffcc00; }
        .progress-container {
            width: 100%;
            background: #222;
            border-radius: 10px;
            height: 20px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #bf00ff, #00c8ff);
            width: 0%;
            transition: width 0.5s;
            border-radius: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 15px 0;
        }
        .stats .stat-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .stats .stat-box .num {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #bf00ff, #00c8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats .stat-box .label { color: #888; font-size: 12px; margin-top: 4px; }
        .log-container {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border: 1px solid #222;
            margin-top: 15px;
        }
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: #bf00ff; border-radius: 10px; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid #111; }
        .log-entry .time { color: #666; margin-right: 10px; }
        .log-entry.success { color: #00cc66; }
        .log-entry.failed { color: #ff0044; }
        .log-entry.info { color: #00c8ff; }
        .footer {
            text-align: center;
            padding-top: 20px;
            color: #444;
            font-size: 12px;
            border-top: 1px solid #222;
            margin-top: 20px;
        }
        .footer span { color: #bf00ff; }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .input-group { flex-direction: column; }
            .input-group input { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 BRONX ULTRA VIEWS</h1>
            <span class="badge">⚡ {{ bot_name }}</span>
        </div>

        <div class="input-group">
            <input type="text" id="linkInput" placeholder="https://t.me/username/123" value="https://t.me/ymmgmhyu/20">
            <input type="number" id="countInput" placeholder="Count" value="50" min="1" max="500" style="max-width:120px;">
            <button id="startBtn" onclick="startTask()">▶️ Start</button>
            <button id="stopBtn" onclick="stopTask()" class="btn-danger" disabled>⏹️ Stop</button>
        </div>

        <div class="status-bar">
            <div class="status-text">
                <span class="dot green" id="statusDot"></span>
                <span id="statusMessage">✅ Ready</span>
            </div>
            <span id="proxyCount">🌐 Proxies: 0</span>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="num" id="sentCount">0</div>
                <div class="label">📤 Views Sent</div>
            </div>
            <div class="stat-box">
                <div class="num" id="successRate">0%</div>
                <div class="label">📊 Success Rate</div>
            </div>
            <div class="stat-box">
                <div class="num" id="totalProxies">0</div>
                <div class="label">🌐 Proxies Loaded</div>
            </div>
        </div>

        <div class="log-container" id="logContainer">
            <div class="log-entry info"><span class="time">[INIT]</span> 🔄 Connecting to server...</div>
        </div>

        <div class="footer">⚡ {{ bot_name }} • Advanced Telegram Views</div>
    </div>

    <script>
        const socket = io();
        let isRunning = false;

        // ============= SOCKET EVENTS =============
        socket.on('connect', () => {
            addLog('🟢 Connected to server', 'info');
            updateStatus('✅ Ready', 'green');
        });

        socket.on('log', (data) => {
            addLog(data.message, 'info');
        });

        socket.on('view', (data) => {
            if (data.status === 'success') {
                addLog(`✅ ${data.proxy} - View sent (Total: ${data.total})`, 'success');
                document.getElementById('sentCount').textContent = data.total;
            } else {
                addLog(`❌ ${data.proxy} - Failed`, 'failed');
            }
        });

        socket.on('progress', (data) => {
            document.getElementById('progressBar').style.width = data.progress + '%';
            document.getElementById('sentCount').textContent = data.sent;
        });

        socket.on('status', (data) => {
            if (data.status === 'running') {
                isRunning = true;
                updateStatus('🔄 Running...', 'yellow');
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
            } else if (data.status === 'completed') {
                isRunning = false;
                updateStatus('✅ Completed', 'green');
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('progressBar').style.width = '100%';
            } else {
                updateStatus(data.message, 'green');
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }
        });

        // ============= FUNCTIONS =============
        function addLog(message, type = 'info') {
            const log = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="time">[${time}]</span> ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function updateStatus(message, color) {
            document.getElementById('statusMessage').textContent = message;
            document.getElementById('statusDot').className = `dot ${color}`;
        }

        function startTask() {
            const link = document.getElementById('linkInput').value.trim();
            const count = parseInt(document.getElementById('countInput').value) || 50;

            if (!link) {
                addLog('❌ Please enter a Telegram post link', 'failed');
                return;
            }

            addLog(`📤 Starting task: ${link} (${count} views)`, 'info');
            
            fetch('/api/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ link, count })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    addLog('✅ Task started successfully', 'success');
                } else {
                    addLog(`❌ ${data.message}`, 'failed');
                }
            })
            .catch(err => addLog(`❌ Error: ${err}`, 'failed'));
        }

        function stopTask() {
            addLog('⏹️ Stopping task...', 'info');
            fetch('/api/stop', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                addLog('⏹️ Stop command sent', 'info');
            })
            .catch(err => addLog(`❌ Error: ${err}`, 'failed'));
        }

        // Update proxy count
        setInterval(() => {
            fetch('/api/status')
            .then(res => res.json())
            .then(data => {
                document.getElementById('totalProxies').textContent = data.proxies || 0;
                document.getElementById('proxyCount').textContent = `🌐 Proxies: ${data.proxies || 0}`;
                if (!isRunning) {
                    document.getElementById('sentCount').textContent = data.sent || 0;
                }
            })
            .catch(() => {});
        }, 3000);

        // Load logs
        fetch('/api/logs')
        .then(res => res.json())
        .then(data => {
            if (data.logs) {
                data.logs.forEach(log => {
                    const type = log.includes('✅') ? 'success' : log.includes('❌') ? 'failed' : 'info';
                    addLog(log, type);
                });
            }
        })
        .catch(() => {});
    </script>
</body>
</html>
